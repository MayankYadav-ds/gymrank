services:
  postgres:
    image: postgres:16-alpine
    container_name: gymrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymrank
      POSTGRES_PASSWORD: gymrank_dev_password
      POSTGRES_DB: gymrank_dev
    ports:
      - "5432:5432"
    volumes:
      - gymrank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymrank -d gymrank_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gymrank_postgres_data:
